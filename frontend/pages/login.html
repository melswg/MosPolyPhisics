<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — МосПолиФизикс</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../figma.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-modal-page">
    <a href="../index.html" class="auth-modal-page__backdrop" aria-label="Закрыть и на главную"></a>

    <div class="auth-modal" role="dialog" aria-modal="true" aria-labelledby="auth-login-title">
        <a href="../index.html" class="auth-modal__close" aria-label="Закрыть">&times;</a>
        <div class="auth-modal__inner">
            <div class="auth-modal__toolbar">
                <button type="button" class="theme-toggle" aria-label="Переключить тему">
                    <i class="fa-regular fa-sun"></i>
                </button>
            </div>
            <h1 id="auth-login-title">Вход</h1>
            <form id="login-form">
                <div class="form-field">
                    <label for="login-ident">Логин или почта</label>
                    <input id="login-ident" name="ident" type="text" autocomplete="username" required>
                </div>
                <div class="form-field">
                    <label for="login-pass">Пароль</label>
                    <input id="login-pass" name="password" type="password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-primary">Войти</button>
                <a class="btn-secondary" href="register.html">Зарегистрироваться</a>
                <p id="login-msg" class="form-msg" role="status"></p>
            </form>
            <p class="auth-modal__home"><a href="../index.html">На главную</a></p>
        </div>
    </div>

    <script src="../site-config.js"></script>
    <script src="../api.js"></script>
    <script src="../scripts.js"></script>
    <script src="../login_page.js"></script>
</body>
</html>
