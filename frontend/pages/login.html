<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — МосПолиФизикс</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container header__container">
            <a href="../index.html" class="logo"><img src="../media/logo.svg" alt="МосПолиФизикс"></a>
            <nav class="nav">
                <ul class="nav__list">
                    <li class="nav__item"><a href="about.html" class="nav__link"><i class="fa-solid fa-circle-info"></i> О нас</a></li>
                    <li class="nav__item"><a href="news.html" class="nav__link"><i class="fa-solid fa-newspaper"></i> Новости</a></li>
                    <li class="nav__item"><a href="project.html" class="nav__link"><i class="fa-solid fa-rocket"></i> Проекты</a></li>
                    <li class="nav__item"><a href="tests.html" class="nav__link"><i class="fa-solid fa-clipboard-check"></i> Тесты</a></li>
                    <li class="nav__item"><a href="account.html" class="nav__link"><i class="fa-solid fa-user"></i> Личный кабинет</a></li>
                </ul>
            </nav>
            <button class="theme-toggle" aria-label="Переключить тему"><i class="fa-regular fa-sun"></i></button>
            <button class="mobile-menu-btn" aria-label="Меню"><i class="fa-solid fa-bars"></i></button>
        </div>
    </header>

    <main class="form-page">
        <div class="form-card">
            <h1>Вход</h1>
            <form id="login-form">
                <div class="form-field">
                    <label for="login-ident">Логин или email</label>
                    <input id="login-ident" name="ident" type="text" autocomplete="username" required>
                </div>
                <div class="form-field">
                    <label for="login-pass">Пароль</label>
                    <input id="login-pass" name="password" type="password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-primary">Войти</button>
                <p id="login-msg" class="form-msg" role="status"></p>
            </form>
            <p class="form-footer">Нет аккаунта? <a href="register.html">Регистрация</a></p>
        </div>
    </main>

    <footer class="footer">
        <div class="container footer__bottom"><p>&copy; 2026 МосПолиФизикс</p></div>
    </footer>

    <script src="../api.js"></script>
    <script src="../scripts.js"></script>
    <script src="../login_page.js"></script>
</body>
</html>
