<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница в разработке - МосПоли ФИЗИКС</title>
    
    <!-- Подключение шрифтов -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Roboto+Mono:ital,wght@0,400;1,300&display=swap" rel="stylesheet">
    
    <!-- Подключение стилей -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/construction.css">
</head>
<body class="body-construction">

    <!-- Фоновые декоративные элементы (как на главной) -->
    <div class="bg-decor">
        <div class="bg-icon"><i class="fa-solid fa-graduation-cap"></i></div>
        <div class="bg-icon"><i class="fa-solid fa-book"></i></div>
        <div class="bg-icon"><i class="fa-solid fa-lightbulb"></i></div>
        <div class="bg-icon"><i class="fa-solid fa-atom"></i></div>
        <div class="bg-icon"><i class="fa-solid fa-square-root-variable"></i></div>
    </div>

    <!-- Основной контент (Карточка) -->
    <main class="construction-card">
        <!-- Кнопка закрытия (опционально, как на скриншоте) -->
        <button class="close-btn" onclick="window.location.href='index.html'">X</button>

        <!-- Маскот -->
        <div class="mascot-container">
            <!-- Используем тот же маскот. В идеале здесь была бы версия в каске -->
            <img src="media/mas.svg" alt="Маскот Атом" class="mascot-img">
            <!-- CSS-наложение каски для имитации скриншота, если нет отдельного файла -->
            <div class="hard-hat-overlay"></div> 
        </div>

        <h1 class="construction-title">Упс, данная страница находится в активной разработке</h1>
        
        <a href="index.html" class="btn-home">На главную</a>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
