<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Страница находится в разработке - МосПоли ФИЗИКС">
    <title>Страница в разработке - МосПолиФИЗИКС</title>
    
    <!-- Подключение шрифтов -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Roboto+Mono:ital,wght@0,400;1,300&display=swap" rel="stylesheet">
    
    <!-- Подключение стилей -->
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="construction.css">
    
    <!-- Иконки (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="body-construction">

    <!-- Фоновые декоративные элементы -->
    <div class="bg-decor">
        <div class="bg-icon"><i class="fa-solid fa-graduation-cap"></i></div>
        <div class="bg-icon"><i class="fa-solid fa-book"></i></div>
        <div class="bg-icon"><i class="fa-solid fa-lightbulb"></i></div>
        <div class="bg-icon"><i class="fa-solid fa-atom"></i></div>
        <div class="bg-icon"><i class="fa-solid fa-square-root-variable"></i></div>
    </div>

    <!-- Основной контент -->
    <main class="construction-card">
        <!-- Кнопка закрытия / возврата на главную -->
        <button class="close-btn" onclick="window.location.href='../index.html'" aria-label="Закрыть">✕</button>

        <!-- Маскот проекта -->
        <div class="mascot-container">
            <img src="../media/masplus.svg" alt="Маскот Атом в каске" class="mascot-img">
        </div>

        <!-- Заголовок страницы -->
        <h1 class="construction-title">Упс, данная страница находится в активной разработке</h1>
        
        <!-- Ссылка возврата на главную -->
        <a href="../index.html" class="btn-home">На главную</a>
    </main>

    <!-- Подключение основного скрипта -->
    <script src="../script.js"></script>
</body>
</html>
