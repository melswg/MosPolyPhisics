<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — МосПолиФизикс</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../figma.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-modal-page">
    <a href="../index.html" class="auth-modal-page__backdrop" aria-label="Закрыть и на главную"></a>

    <div class="auth-modal" role="dialog" aria-modal="true" aria-labelledby="auth-reg-title">
        <a href="../index.html" class="auth-modal__close" aria-label="Закрыть">&times;</a>
        <div class="auth-modal__inner">
            <div class="auth-modal__toolbar">
                <button type="button" class="theme-toggle" aria-label="Переключить тему">
                    <i class="fa-regular fa-sun"></i>
                </button>
            </div>
            <h1 id="auth-reg-title">Регистрация</h1>
            <form id="register-form">
                <div class="form-field">
                    <label for="reg-user">Имя</label>
                    <input id="reg-user" name="username" type="text" autocomplete="username" required>
                </div>
                <div class="form-field">
                    <label for="reg-email">Почта</label>
                    <input id="reg-email" name="email" type="email" autocomplete="email" required>
                </div>
                <div class="form-field">
                    <label for="reg-pass">Пароль</label>
                    <input id="reg-pass" name="password" type="password" autocomplete="new-password" required>
                </div>
                <button type="submit" class="btn-primary">Создать аккаунт</button>
                <a class="btn-secondary" href="login.html">Уже есть аккаунт — войти</a>
                <p id="register-msg" class="form-msg" role="status"></p>
            </form>
            <p class="auth-modal__home"><a href="../index.html">На главную</a></p>
        </div>
    </div>

    <script src="../api.js"></script>
    <script src="../scripts.js"></script>
    <script src="../register_page.js"></script>
</body>
</html>
